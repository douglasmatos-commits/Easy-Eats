<div>
    <h1>Cadastro Garçom</h1>
</div>

<div class="container">

    <div class=" cadastro-box">

        <div class="header">
            <div class="logo">
                🚚
            </div>

            <h1>Cadastro Garçom</h1>
        </div>

        <form action="/upload" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" placeholder="Seu nome completo" name="nome" />
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" placeholder="seu@email.com" name="email" />
            </div>

            <div class="form-group">
                <label>Telfone</label>
                <input type="text" name="telefone" placeholder="(00) 00000-0000" pattern="[0-9]{10,11}"
                    title="Digite apenas números, sem parênteses ou traço" maxlength="11">
            </div>

            <div class="form-group">
                <label>CPF</label>
                <input type="text" name="cpf" placeholder="000.000.000-00" pattern="[0-9]{11}"
                    title="Digite apenas números, sem pontos ou traço" maxlength="11">
            </div>

            <div class="password-field">
                <label>Senha</label>
                <input type="password" placeholder="••••••••" name="senha" />
            </div>

            <div>
                <label>Imagem de Perfil:</label>
                <input type="file" name="profileImage" accept="image/*" />
            </div>

            <button type="submit" class="login-button">
                Cadastrar
            </button>

        </form>

    </div>

</div>
